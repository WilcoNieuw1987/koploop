<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Koploop 2026 - 10km</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1e293b;
      overflow: hidden;
      height: 100dvh;
    }

    #map {
      width: 100%;
      height: 100dvh;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0));
      padding: 12px 16px 32px;
      pointer-events: none;
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: #f97316;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
      line-height: 1.1;
    }

    .header .subtitle {
      font-size: 12px;
      color: #64748b;
      font-weight: 400;
    }

    .stats-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,0,0,0.1);
      padding: 10px 16px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 4px;
      margin-bottom: 8px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
    }

    .stat-label {
      font-size: 10px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .elevation-profile {
      position: relative;
      width: 100%;
      height: 70px;
      margin-bottom: 8px;
      border-radius: 8px;
      overflow: hidden;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .elevation-profile canvas {
      width: 100%;
      height: 100%;
    }

    .btn-track {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-track.inactive {
      background: #f97316;
      color: #fff;
    }

    .btn-track.active {
      background: rgba(249, 115, 22, 0.15);
      color: #f97316;
      border: 2px solid #f97316;
    }

    .btn-track:active {
      transform: scale(0.98);
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: currentColor;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.5); }
    }

    .km-marker-icon {
      background: #fff;
      border: 2px solid #e74c3c;
      color: #e74c3c;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .start-finish-icon {
      background: #f97316;
      color: #fff;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(249, 115, 22, 0.4);
    }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3) !important;
    }

    .leaflet-control-zoom a {
      background: rgba(255, 255, 255, 0.95) !important;
      color: #1e293b !important;
      border: none !important;
      width: 36px !important;
      height: 36px !important;
      line-height: 36px !important;
      font-size: 18px !important;
    }

    .leaflet-control-zoom a:first-child {
      border-radius: 10px 10px 0 0 !important;
    }

    .leaflet-control-zoom a:last-child {
      border-radius: 0 0 10px 10px !important;
    }

    .center-btn {
      position: fixed;
      bottom: 220px;
      right: 16px;
      z-index: 1000;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0,0,0,0.1);
      color: #1e293b;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .center-btn.visible {
      display: flex;
    }

    .weather-btn {
      position: fixed;
      bottom: 220px;
      left: 16px;
      z-index: 1000;
      height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0,0,0,0.1);
      color: #1e293b;
      font-size: 13px;
      font-weight: 600;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .weather-panel {
      position: fixed;
      bottom: 270px;
      left: 16px;
      right: 16px;
      z-index: 1001;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 16px;
      display: none;
    }

    .weather-panel.visible {
      display: block;
    }

    .weather-panel h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1e293b;
    }

    .weather-panel .weather-sub {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .rain-chart {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 60px;
      margin-bottom: 6px;
    }

    .rain-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }

    .rain-bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      min-height: 1px;
      transition: height 0.3s;
    }

    .rain-bar.dry { background: #d1fae5; }
    .rain-bar.light { background: #93c5fd; }
    .rain-bar.moderate { background: #3b82f6; }
    .rain-bar.heavy { background: #1d4ed8; }

    .rain-times {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #94a3b8;
    }

    .weather-summary {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .weather-summary.dry {
      background: #d1fae5;
      color: #065f46;
    }

    .weather-summary.rain {
      background: #dbeafe;
      color: #1e40af;
    }

    .weather-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      font-size: 18px;
      color: #94a3b8;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div class="logo">K</div>
      <div>
        <h1>Koploop 2026</h1>
        <div class="subtitle">10 km - Amerongen</div>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <button class="weather-btn" id="weatherBtn" onclick="toggleWeather()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/><circle cx="12" cy="12" r="4"/></svg>
    <span id="weatherBtnText">Weer laden...</span>
  </button>

  <div class="weather-panel" id="weatherPanel">
    <button class="weather-close" onclick="toggleWeather()">&times;</button>
    <h3>Neerslagverwachting</h3>
    <div class="weather-sub">Komende 2 uur - Amerongen</div>
    <div class="rain-chart" id="rainChart"></div>
    <div class="rain-times" id="rainTimes"></div>
    <div class="weather-summary" id="weatherSummary"></div>
  </div>

  <button class="center-btn visible" id="routeBtn" onclick="showRoute()" title="Toon route">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
  </button>

  <button class="center-btn" id="centerBtn" onclick="centerOnUser()" style="bottom: 270px;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
  </button>

  <div class="stats-bar">
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-value" id="distance">-</div>
        <div class="stat-label">gelopen</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="remaining">10.0</div>
        <div class="stat-label">te gaan</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="currentEle">-</div>
        <div class="stat-label">hoogte</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="climbLeft">-</div>
        <div class="stat-label">stijging</div>
      </div>
    </div>
    <div class="elevation-profile">
      <canvas id="elevationCanvas"></canvas>
    </div>
    <button class="btn-track inactive" id="trackBtn" onclick="toggleTracking()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
      Locatie volgen
    </button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Route coordinates from GPX
    const route = [
      [52.00428,5.453506],[52.004517,5.453273],[52.004845,5.452873],[52.005057,5.452482],
      [52.005132,5.452395],[52.005345,5.452487],[52.006107,5.450238],[52.005996,5.449723],
      [52.004047,5.447891],[52.00557,5.44527],[52.007723,5.448028],[52.008346,5.447765],
      [52.010365,5.444189],[52.010801,5.444616],[52.011283,5.444922],[52.011916,5.445149],
      [52.01226,5.445222],[52.012898,5.445431],[52.013365,5.445526],[52.013459,5.44549],
      [52.015378,5.445901],[52.015961,5.446086],[52.017131,5.446559],[52.017401,5.446705],
      [52.017513,5.446917],[52.017666,5.446245],[52.017871,5.445874],[52.018352,5.445311],
      [52.018461,5.444956],[52.01914,5.441692],[52.019321,5.441157],[52.019321,5.440937],
      [52.019394,5.440781],[52.019368,5.440401],[52.019425,5.439927],[52.019524,5.439832],
      [52.020085,5.438978],[52.020678,5.438354],[52.020839,5.438219],[52.021481,5.437455],
      [52.021957,5.437005],[52.022167,5.43687],[52.022552,5.436812],[52.022875,5.436918],
      [52.022923,5.436916],[52.022878,5.436181],[52.023648,5.436244],[52.026414,5.436642],
      [52.026421,5.434502],[52.026966,5.434364],[52.027699,5.434083],[52.027988,5.43404],
      [52.028593,5.434053],[52.029578,5.434336],[52.030186,5.434682],[52.030391,5.43471],
      [52.031547,5.434568],[52.033009,5.434611],[52.033102,5.434597],[52.033579,5.436074],
      [52.033659,5.436214],[52.034644,5.437546],[52.035637,5.439618],[52.035632,5.439638],
      [52.035842,5.440068],[52.035217,5.440241],[52.035102,5.440637],[52.035025,5.440767],
      [52.034589,5.441118],[52.034503,5.441161],[52.034228,5.441183],[52.034086,5.441361],
      [52.033719,5.441477],[52.033598,5.441462],[52.033353,5.441571],[52.033143,5.441728],
      [52.033091,5.441995],[52.033114,5.442468],[52.032989,5.443071],[52.032727,5.443795],
      [52.032474,5.444206],[52.032327,5.444664],[52.032083,5.445203],[52.031845,5.445549],
      [52.03173,5.44601],[52.031679,5.446045],[52.031504,5.446665],[52.031484,5.447188],
      [52.030758,5.447166],[52.030541,5.447245],[52.030204,5.447264],[52.029788,5.447169],
      [52.029415,5.447435],[52.029026,5.44759],[52.028734,5.447599],[52.028509,5.447565],
      [52.027984,5.447636],[52.027747,5.447582],[52.02766,5.4475],[52.027475,5.447481],
      [52.026566,5.447495],[52.025035,5.447378],[52.024346,5.44742],[52.024089,5.447363],
      [52.023442,5.447311],[52.023402,5.447327],[52.023373,5.447358],[52.023328,5.447384],
      [52.023258,5.447556],[52.023166,5.447612],[52.022869,5.447478],[52.022567,5.447498],
      [52.022458,5.44741],[52.022355,5.447418],[52.02219,5.447362],[52.022095,5.447436],
      [52.021941,5.447389],[52.022024,5.447565],[52.021941,5.447389],[52.021891,5.447481],
      [52.021909,5.448443],[52.021989,5.450469],[52.021969,5.450736],[52.021714,5.452594],
      [52.021737,5.452906],[52.022121,5.454474],[52.022131,5.454669],[52.021293,5.458086],
      [52.02122,5.458537],[52.021292,5.45854],[52.016662,5.458435],[52.014211,5.457913],
      [52.011656,5.456034],[52.011925,5.455353],[52.005996,5.449723],[52.006107,5.450238],
      [52.005345,5.452487],[52.005132,5.452395],[52.005057,5.452482],[52.004845,5.452873],
      [52.004517,5.453273],[52.004297,5.45349]
    ];

    // Calculate cumulative distances along route
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // Elevation data per route point (from Open-Meteo API)
    const elevation = [
      16,16,16,15,15,15,23,24,18,17,16,24,20,20,22,28,28,29,33,33,
      46,54,53,53,51,51,51,50,44,43,31,31,31,31,24,24,24,29,27,36,
      30,30,21,21,21,18,22,18,17,17,18,18,18,18,21,21,18,12,12,14,
      14,10,10,10,13,12,12,12,8,8,8,12,12,12,12,11,11,11,9,11,
      14,14,11,11,11,11,8,8,8,8,8,8,8,8,8,8,8,8,8,13,
      18,17,17,20,20,20,20,20,23,23,23,23,26,26,26,26,26,25,26,26,
      25,25,25,21,21,23,23,25,25,25,67,57,59,57,24,23,15,15,15,16,
      16,16
    ];

    const cumDist = [0];
    for (let i = 1; i < route.length; i++) {
      cumDist.push(cumDist[i-1] + haversine(route[i-1][0], route[i-1][1], route[i][0], route[i][1]));
    }
    const totalDist = cumDist[cumDist.length - 1];

    // Calculate total ascent/descent
    let totalAscent = 0, totalDescent = 0;
    for (let i = 1; i < elevation.length; i++) {
      const diff = elevation[i] - elevation[i-1];
      if (diff > 0) totalAscent += diff;
      else totalDescent += Math.abs(diff);
    }

    // Draw elevation profile
    function drawElevationProfile(progressRatio) {
      const canvas = document.getElementById('elevationCanvas');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      const w = rect.width;
      const h = rect.height;

      const minEle = Math.min(...elevation) - 2;
      const maxEle = Math.max(...elevation) + 5;
      const padding = { top: 14, bottom: 18, left: 0, right: 0 };
      const pw = w - padding.left - padding.right;
      const ph = h - padding.top - padding.bottom;

      function x(i) { return padding.left + (cumDist[i] / totalDist) * pw; }
      function y(ele) { return padding.top + ph - ((ele - minEle) / (maxEle - minEle)) * ph; }

      // Fill area
      ctx.beginPath();
      ctx.moveTo(x(0), y(minEle));
      for (let i = 0; i < elevation.length; i++) {
        ctx.lineTo(x(i), y(elevation[i]));
      }
      ctx.lineTo(x(elevation.length - 1), y(minEle));
      ctx.closePath();

      const grad = ctx.createLinearGradient(0, padding.top, 0, h - padding.bottom);
      grad.addColorStop(0, 'rgba(231, 76, 60, 0.3)');
      grad.addColorStop(1, 'rgba(231, 76, 60, 0.05)');
      ctx.fillStyle = grad;
      ctx.fill();

      // Line
      ctx.beginPath();
      for (let i = 0; i < elevation.length; i++) {
        if (i === 0) ctx.moveTo(x(i), y(elevation[i]));
        else ctx.lineTo(x(i), y(elevation[i]));
      }
      ctx.strokeStyle = '#e74c3c';
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.stroke();

      // Km labels at bottom
      ctx.fillStyle = '#94a3b8';
      ctx.font = '10px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      for (let km = 0; km <= 10; km += 2) {
        const xKm = padding.left + (km / totalDist) * pw;
        ctx.fillText(km + 'km', xKm, h - 3);
      }

      // Min/max labels
      ctx.fillStyle = '#64748b';
      ctx.font = '9px -apple-system, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(Math.round(maxEle) + 'm', 4, padding.top + 10);
      ctx.fillText(Math.round(minEle) + 'm', 4, h - padding.bottom - 2);

      // Position marker
      if (progressRatio !== null && progressRatio >= 0) {
        const pxX = padding.left + progressRatio * pw;
        // Interpolate elevation at this point
        let eleAtPos = elevation[0];
        const distAtPos = progressRatio * totalDist;
        for (let i = 1; i < cumDist.length; i++) {
          if (cumDist[i] >= distAtPos) {
            const t = (distAtPos - cumDist[i-1]) / (cumDist[i] - cumDist[i-1]);
            eleAtPos = elevation[i-1] + t * (elevation[i] - elevation[i-1]);
            break;
          }
        }
        const pxY = y(eleAtPos);

        // Vertical line
        ctx.beginPath();
        ctx.moveTo(pxX, padding.top);
        ctx.lineTo(pxX, h - padding.bottom);
        ctx.strokeStyle = 'rgba(59, 130, 246, 0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Dot
        ctx.beginPath();
        ctx.arc(pxX, pxY, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#3b82f6';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Elevation label at dot
        ctx.fillStyle = '#3b82f6';
        ctx.font = 'bold 10px -apple-system, sans-serif';
        ctx.textAlign = pxX > w / 2 ? 'right' : 'left';
        const labelX = pxX > w / 2 ? pxX - 8 : pxX + 8;
        ctx.fillText(Math.round(eleAtPos) + 'm', labelX, pxY - 8);
      }
    }

    // Initial draw without position
    drawElevationProfile(null);

    // Test mode: add ?km=2 to URL to simulate position at km 2
    const testKm = parseFloat(new URLSearchParams(window.location.search).get('km'));
    if (!isNaN(testKm) && testKm >= 0 && testKm <= totalDist) {
      setTimeout(() => {
        const testPos = getPointAtDistance(testKm);
        if (testPos) {
          userMarker = createUserMarker(testPos);
          userMarker.addTo(map);
          map.setView(testPos, 15);
          updateStats(testPos);
        }
      }, 500);
    }

    // Init map
    const map = L.map('map', {
      zoomControl: true,
      attributionControl: false
    }).setView([52.020, 5.445], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(map);

    // Draw route
    // Route outline for visibility
    L.polyline(route, {
      color: '#e74c3c',
      weight: 14,
      opacity: 0.25,
      smoothFactor: 1
    }).addTo(map);

    const routeLine = L.polyline(route, {
      color: '#d32f2f',
      weight: 6,
      opacity: 1,
      smoothFactor: 1
    }).addTo(map);

    map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });

    // Km markers
    function addKmMarkers() {
      for (let km = 1; km <= 9; km++) {
        const pos = getPointAtDistance(km);
        if (pos) {
          const icon = L.divIcon({
            className: '',
            html: `<div class="km-marker-icon">${km}</div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          });
          L.marker(pos, { icon, interactive: false }).addTo(map);
        }
      }
    }

    function getPointAtDistance(targetKm) {
      for (let i = 1; i < cumDist.length; i++) {
        if (cumDist[i] >= targetKm) {
          const ratio = (targetKm - cumDist[i-1]) / (cumDist[i] - cumDist[i-1]);
          return [
            route[i-1][0] + ratio * (route[i][0] - route[i-1][0]),
            route[i-1][1] + ratio * (route[i][1] - route[i-1][1])
          ];
        }
      }
      return null;
    }

    addKmMarkers();

    // Start/Finish marker
    const sfIcon = L.divIcon({
      className: '',
      html: '<div class="start-finish-icon">START / FINISH</div>',
      iconSize: [100, 24],
      iconAnchor: [50, 12]
    });
    L.marker(route[0], { icon: sfIcon, interactive: false }).addTo(map);

    // User location
    let userMarker = null;
    let accuracyCircle = null;
    let watchId = null;
    let tracking = false;
    let followUser = true;

    function createUserMarker(latlng) {
      const icon = L.divIcon({
        className: '',
        html: `<div style="
          width: 18px; height: 18px;
          background: #3b82f6;
          border: 3px solid #fff;
          border-radius: 50%;
          box-shadow: 0 0 12px rgba(59, 130, 246, 0.6), 0 0 24px rgba(59, 130, 246, 0.3);
        "></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9]
      });
      return L.marker(latlng, { icon, zIndexOffset: 1000 });
    }

    function toggleTracking() {
      const btn = document.getElementById('trackBtn');

      if (tracking) {
        stopTracking();
        btn.className = 'btn-track inactive';
        btn.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          Locatie volgen
        `;
      } else {
        startTracking();
        btn.className = 'btn-track active';
        btn.innerHTML = `
          <div class="pulse-dot"></div>
          Locatie wordt gevolgd...
        `;
      }
    }

    function startTracking() {
      if (!navigator.geolocation) {
        alert('Locatie wordt niet ondersteund door je browser.');
        return;
      }

      tracking = true;
      followUser = true;
      document.getElementById('centerBtn').classList.remove('visible');

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          const latlng = [pos.coords.latitude, pos.coords.longitude];

          if (userMarker) {
            userMarker.setLatLng(latlng);
          } else {
            userMarker = createUserMarker(latlng);
            userMarker.addTo(map);
          }

          if (accuracyCircle) {
            accuracyCircle.setLatLng(latlng);
            accuracyCircle.setRadius(pos.coords.accuracy);
          } else {
            accuracyCircle = L.circle(latlng, {
              radius: pos.coords.accuracy,
              fillColor: '#3b82f6',
              fillOpacity: 0.1,
              color: '#3b82f6',
              weight: 1,
              opacity: 0.3
            }).addTo(map);
          }

          if (followUser) {
            map.setView(latlng, Math.max(map.getZoom(), 15));
          }

          updateStats(latlng);
        },
        (err) => {
          console.error('Locatie fout:', err);
          alert('Kan locatie niet ophalen. Zorg dat locatie-toegang is ingeschakeld.');
          toggleTracking();
        },
        {
          enableHighAccuracy: true,
          maximumAge: 5000,
          timeout: 15000
        }
      );

      map.on('dragstart', () => {
        if (tracking) {
          followUser = false;
          document.getElementById('centerBtn').classList.add('visible');
        }
      });
    }

    function stopTracking() {
      tracking = false;
      followUser = false;
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      document.getElementById('centerBtn').classList.remove('visible');
    }

    function showRoute() {
      followUser = false;
      map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
    }

    function centerOnUser() {
      if (userMarker) {
        followUser = true;
        map.setView(userMarker.getLatLng(), Math.max(map.getZoom(), 15));
        document.getElementById('centerBtn').classList.remove('visible');
      }
    }

    function updateStats(userPos) {
      // Find nearest point on route
      let minDist = Infinity;
      let nearestIdx = 0;
      let nearestPoint = null;

      for (let i = 0; i < route.length - 1; i++) {
        const proj = projectOnSegment(userPos, route[i], route[i+1]);
        const d = haversine(userPos[0], userPos[1], proj.point[0], proj.point[1]);
        if (d < minDist) {
          minDist = d;
          nearestIdx = i;
          nearestPoint = proj;
        }
      }

      // Distance to start
      const distToStart = haversine(userPos[0], userPos[1], route[0][0], route[0][1]);

      // If more than 500m from route, show distance to start instead
      if (minDist > 0.5) {
        if (distToStart < 1) {
          document.getElementById('distance').textContent = Math.round(distToStart * 1000) + 'm';
        } else {
          document.getElementById('distance').textContent = distToStart.toFixed(1) + 'km';
        }
        document.getElementById('distance').parentElement.querySelector('.stat-label').textContent = 'tot start';
        document.getElementById('remaining').textContent = totalDist.toFixed(1);
        document.getElementById('currentEle').textContent = '-';
        document.getElementById('climbLeft').textContent = Math.round(totalAscent) + 'm';
        drawElevationProfile(null);
        return;
      }

      // On route - show normal stats
      document.getElementById('distance').parentElement.querySelector('.stat-label').textContent = 'gelopen';

      // Distance along route to nearest point
      const distOnRoute = cumDist[nearestIdx] +
        haversine(route[nearestIdx][0], route[nearestIdx][1], nearestPoint.point[0], nearestPoint.point[1]);

      const distKm = distOnRoute;
      const remainKm = Math.max(0, totalDist - distOnRoute);
      const progressRatio = Math.min(1, distOnRoute / totalDist);

      document.getElementById('distance').textContent = distKm.toFixed(1);
      document.getElementById('remaining').textContent = remainKm.toFixed(1);

      // Interpolate current elevation
      let curEle = elevation[0];
      for (let i = 1; i < cumDist.length; i++) {
        if (cumDist[i] >= distOnRoute) {
          const t = (distOnRoute - cumDist[i-1]) / (cumDist[i] - cumDist[i-1]);
          curEle = elevation[i-1] + t * (elevation[i] - elevation[i-1]);
          break;
        }
      }
      document.getElementById('currentEle').textContent = Math.round(curEle) + 'm';

      // Calculate remaining ascent from current position
      let remainAscent = 0;
      for (let i = nearestIdx + 1; i < elevation.length; i++) {
        const diff = elevation[i] - elevation[i-1];
        if (diff > 0) remainAscent += diff;
      }
      document.getElementById('climbLeft').textContent = Math.round(remainAscent) + 'm';

      // Update elevation profile with position
      drawElevationProfile(progressRatio);
    }

    // Weather functionality
    let weatherData = null;
    let weatherPanelOpen = false;

    function toggleWeather() {
      const panel = document.getElementById('weatherPanel');
      weatherPanelOpen = !weatherPanelOpen;
      panel.classList.toggle('visible', weatherPanelOpen);
    }

    async function fetchWeather() {
      try {
        // Center of route for weather data
        const lat = 52.020;
        const lon = 5.445;
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&minutely_15=precipitation&timezone=Europe/Amsterdam&forecast_minutely_15=8`
        );
        const data = await res.json();

        if (data.minutely_15 && data.minutely_15.precipitation) {
          const precip = data.minutely_15.precipitation.slice(0, 8); // 2 hours in 15-min slots
          const times = data.minutely_15.time.slice(0, 8);
          renderWeather(precip, times);
        }
      } catch (e) {
        document.getElementById('weatherBtnText').textContent = 'Weer niet beschikbaar';
      }
    }

    function renderWeather(precip, times) {
      const maxPrecip = Math.max(...precip, 0.5);
      const chart = document.getElementById('rainChart');
      const timesRow = document.getElementById('rainTimes');
      const summary = document.getElementById('weatherSummary');
      const btnText = document.getElementById('weatherBtnText');

      const totalRain = precip.reduce((a, b) => a + b, 0);
      const hasRain = totalRain > 0;
      const maxRainVal = Math.max(...precip);

      // Update button
      if (!hasRain) {
        btnText.textContent = 'Droog';
        document.getElementById('weatherBtn').querySelector('svg').outerHTML =
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      } else {
        btnText.textContent = 'Regen verwacht';
        document.getElementById('weatherBtn').querySelector('svg').outerHTML =
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 13v8M8 13v8M12 15v8M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/></svg>';
      }

      // Render bars
      chart.innerHTML = precip.map((p, i) => {
        const height = Math.max(2, (p / maxPrecip) * 55);
        let cls = 'dry';
        if (p > 2) cls = 'heavy';
        else if (p > 0.5) cls = 'moderate';
        else if (p > 0) cls = 'light';
        return `<div class="rain-bar-wrap"><div class="rain-bar ${cls}" style="height:${height}px" title="${p.toFixed(1)} mm"></div></div>`;
      }).join('');

      // Render times
      const timeLabels = times.map(t => {
        const d = new Date(t);
        return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
      });
      timesRow.innerHTML = `<span>${timeLabels[0]}</span><span>${timeLabels[Math.floor(timeLabels.length/2)]}</span><span>${timeLabels[timeLabels.length-1]}</span>`;

      // Summary
      if (!hasRain) {
        summary.className = 'weather-summary dry';
        summary.textContent = 'Geen neerslag verwacht de komende 2 uur';
      } else if (maxRainVal > 2) {
        summary.className = 'weather-summary rain';
        summary.textContent = 'Flinke buien verwacht! Bereid je voor op regen';
      } else {
        summary.className = 'weather-summary rain';
        summary.textContent = 'Lichte neerslag verwacht';
      }
    }

    // Fetch weather on load and refresh every 5 minutes
    fetchWeather();
    setInterval(fetchWeather, 5 * 60 * 1000);

    function projectOnSegment(p, a, b) {
      const dx = b[0] - a[0];
      const dy = b[1] - a[1];
      if (dx === 0 && dy === 0) return { point: a, t: 0 };

      let t = ((p[0] - a[0]) * dx + (p[1] - a[1]) * dy) / (dx * dx + dy * dy);
      t = Math.max(0, Math.min(1, t));

      return {
        point: [a[0] + t * dx, a[1] + t * dy],
        t: t
      };
    }
  </script>
